name: 每日更新新聞

on:
  schedule:
    # GitHub 用 UTC 時間。22:00 UTC = 台灣早上 06:00
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 產生 news.json
        run: node scripts/generate.mjs

      - name: 提交更新
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "沒有變更，跳過提交"
          else
            git commit -m "更新新聞 $(date -u +%Y-%m-%d)"
            git push
          fi
